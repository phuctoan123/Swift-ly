worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zones
    # 10 requests per second per IP for general API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 100 requests per second per IP for redirects
    limit_req_zone $binary_remote_addr zone=redirect_limit:10m rate=100r/s;

    upstream fastapi_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name localhost;
        
        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Hide Nginx version
        server_tokens off;

        # General API Endpoints
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Short URL Redirect Endpoint (root path)
        location / {
            limit_req zone=redirect_limit burst=50 nodelay;
            limit_req_status 429;
            
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
